<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream DFS — Mobile App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dfs-app.css">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: radial-gradient(120% 100% at 50% 0%, #14181a 0%, #08090a 55%, #050506 100%); }
  body { display: grid; place-items: center; min-height: 100vh; font-family: "Plus Jakarta Sans", system-ui, sans-serif; }
  #root { width: 402px; height: 874px; transform-origin: center center; will-change: transform; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  /* when embedded in the landing hero, drop the page bg so the phone floats */
  if (window.self !== window.top) {
    document.documentElement.style.background = 'transparent';
    document.addEventListener('DOMContentLoaded', function () { document.body.style.background = 'transparent'; });
    document.body.style.background = 'transparent';
  }
</script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#08090a"/>
    <rect x="34" y="22" width="32" height="18" rx="9" fill="none" stroke="#2bcdd3" stroke-width="3"/>
    <text x="50" y="36" font-family="sans-serif" font-size="11" font-weight="800" fill="#2bcdd3" text-anchor="middle">DFS</text>
    <rect x="30" y="52" width="40" height="9" rx="4.5" fill="#2bcdd3"/>
    <rect x="36" y="68" width="28" height="7" rx="3.5" fill="#1c1e1f"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="dfs-data.jsx"></script>
<script type="text/babel" src="dfs-ui.jsx"></script>
<script type="text/babel" src="dfs-screens.jsx"></script>
<script type="text/babel" src="dfs-lineup.jsx"></script>
<script type="text/babel" src="dfs-main.jsx"></script>
<script>
  (function () {
    var root = document.getElementById('root');
    function fit() {
      var pad = 28;
      var s = Math.min(1, (window.innerHeight - pad) / 874, (window.innerWidth - pad) / 402);
      root.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();
    // re-fit after React mounts / fonts load
    if (window.ResizeObserver) { new ResizeObserver(fit).observe(root); }
    var n = 0, iv = setInterval(function () { fit(); if (++n > 12) clearInterval(iv); }, 120);
    window.addEventListener('load', fit);
  })();
</script>
</body>
</html>
